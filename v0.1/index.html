<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzeria - Bestellaufnahme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="extra-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Anpassen</h2>
            <p style="font-size: 0.8rem; color: #666;">1x Tippen = Extra (Grün) | 2x Tippen = Ohne (Rot)</p>
            
            <div class="modal-section">
                <div class="extra-grid" id="zutaten-container">
                    </div>
            </div>

            <div class="modal-actions">
                <button class="confirm-btn" onclick="confirmItem()">HINZUFÜGEN</button>
                <button class="cancel-btn" onclick="closeModal()">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <header>
        <h1>🍕 Pizzeria Bestellsystem</h1>
    </header>

    <main>
        <section class="menu-section">
            <h3>🍕 Pizzen</h3>
            <div class="menu-grid">
                <button class="pizza-btn" onclick="openExtraModal('Margherita')">Margherita</button>
                <button class="pizza-btn" onclick="openExtraModal('Diavolo')">Diavolo</button>
                <button class="pizza-btn" onclick="openExtraModal('Dilara')">Dilara</button>
                <button class="pizza-btn" onclick="openExtraModal('Pros. Funghi')">Pros. Funghi</button>
                <button class="pizza-btn" onclick="openExtraModal('Tonno')">Tonno</button>
                <button class="pizza-btn" onclick="openExtraModal('Capricciosa')">Capricciosa</button>
                <button class="pizza-btn" onclick="openExtraModal('Calzone')">Calzone</button>
                <button class="pizza-btn" onclick="openExtraModal('Salatpizza')">Salatpizza</button>
                <button class="pizza-btn" onclick="openExtraModal('Hauspizza')">Hauspizza</button>
                <button class="pizza-btn" onclick="openExtraModal('Funghi')">Funghi</button>
                <button class="pizza-btn" onclick="openExtraModal('Quattro Form.')">Quattro Form.</button>
                <button class="pizza-btn" onclick="openExtraModal('Frutti di Mare')">Frutti di Mare</button>
                <button class="pizza-btn" onclick="openExtraModal('Siziliana')">Siziliana</button>
                <button class="pizza-btn" onclick="openExtraModal('Hawaii')">Hawaii</button>
                <button class="pizza-btn" onclick="openExtraModal('Quattro Stat.')">Quattro Stat.</button>
                <button class="pizza-btn" onclick="openExtraModal('Mister')">Mister</button>
                <button class="pizza-btn" onclick="openExtraModal('Gorgonzola')">Gorgonzola</button>
                <button class="pizza-btn" onclick="openExtraModal('Mexicana')">Mexicana</button>
                <button class="pizza-btn" onclick="openExtraModal('Hansi')">Hansi</button>
                <button class="pizza-btn" onclick="openExtraModal('Alis Pizza')">Alis Pizza</button>
                <button class="pizza-btn" onclick="openExtraModal('Tyrolia')">Tyrolia</button>
                <button class="pizza-btn" onclick="openExtraModal('Regina')">Regina</button>
                <button class="pizza-btn" onclick="openExtraModal('Vegetaria')">Vegetaria</button>
                <button class="pizza-btn" onclick="openExtraModal('Pizzabrot')">Pizzabrot</button>
            </div>
        </section>

        <section class="menu-section">
            <h3>🥙 Kebap & 🍟 Pommes</h3>
            <div class="menu-grid">
                <button class="pizza-btn" onclick="openExtraModal('Kebap')">Kebap</button>
                <button class="pizza-btn" onclick="openExtraModal('Kebap spez.')">Kebap spez.</button>
                <button class="pizza-btn" onclick="openExtraModal('Kebap veg.')">Kebap veg.</button>
                <button class="pizza-btn" onclick="openExtraModal('Kebap Teller (Salat)')">Kebap Teller (Salat)</button>
                <button class="pizza-btn" onclick="openExtraModal('Kebap Teller (Pommes)')">Kebap Teller (Pommes)</button>
                <button class="pizza-btn" onclick="openExtraModal('Dürüm')">Dürüm</button>
                <button class="pizza-btn" onclick="openExtraModal('Dürüm spez.')">Dürüm spez.</button>
                <button class="pizza-btn" onclick="openExtraModal('Dürüm veg.')">Dürüm veg.</button>
                <button class="pizza-btn" onclick="openExtraModal('Kebapfleisch')">Kebapfleisch</button>
                <button class="pizza-btn" onclick="openExtraModal('Pommes')">Pommes</button>
                <button class="pizza-btn" onclick="openExtraModal('Loaded Pommes')">Loaded Pommes</button>
                <button class="pizza-btn" onclick="openExtraModal('Loaded Pommes spez.')">Loaded Pommes spez.</button>
            </div>
        </section>

        <section class="menu-section">
            <h3>🥗 Salate</h3>
            <div class="menu-grid">
                <button class="pizza-btn" onclick="openExtraModal('Fitnesssalat')">Fitnesssalat</button>
                <button class="pizza-btn" onclick="openExtraModal('Griechischer Salat')">Griechischer Salat</button>
                <button class="pizza-btn" onclick="openExtraModal('Gemischter Salat')">Gemischter Salat</button>
            </div>
        </section>

        <section class="time-section">
            <h3>🕒 Abholzeit:</h3>
            <div class="time-grid">
                <button class="time-btn" onclick="setTime(15)">15 Min</button>
                <button class="time-btn" onclick="setTime(20)">20 Min</button>
                <button class="time-btn active" id="default-time" onclick="setTime(30)">30 Min</button>
                <button class="time-btn" onclick="setTime(45)">45 Min</button>
                <input type="time" id="custom-time" class="time-input" onchange="setCustomTime()">
            </div>
        </section>

        <section class="order-section">
            <h3>Aktuelle Bestellung:</h3>
            <div class="order-box">
                <ul id="order-list"></ul>
                <div id="empty-msg">Noch keine Artikel ausgewählt</div>
            </div>
            
            <div class="action-buttons">
                <button class="undo-btn" onclick="undoLast()">⬅ SCHRITT ZURÜCK</button>
                <button class="clear-btn" onclick="clearOrder()">ALLES LÖSCHEN</button>
                <button class="send-btn" onclick="sendToKitchen()">AN KÜCHE SENDEN</button>
            </div>
        </section>
    </main>

    <script>
        // DEINE ZUTATENLISTE
        const zutatenListe = [
            "Kleine Pizza", "Knoblauchöl", "Scharf", "Joghurtsauce", 
            "Zwiebeln", "Käse", "Kebapfleisch", "Thunfisch", 
            "Schinken", "Salami", "Oliven", "Pilze", 
            "Salat", "Tomaten", "Ei", "Meeresfrüchte"
        ];

        let currentOrder = [];
        let tempItem = "";
        let zutatenStatus = {}; // 0 = neutral, 1 = extra, 2 = ohne
        let selectedPickupTime = "";

        // Modal Initialisierung
        function openExtraModal(itemName) {
            tempItem = itemName;
            zutatenStatus = {}; 
            zutatenListe.forEach(z => zutatenStatus[z] = 0);
            
            document.getElementById('modal-title').innerText = itemName + " anpassen";
            renderZutaten();
            document.getElementById('extra-modal').style.display = "flex";
        }

        function renderZutaten() {
            const container = document.getElementById('zutaten-container');
            container.innerHTML = "";
            zutatenListe.forEach(zutat => {
                const btn = document.createElement('button');
                btn.className = "btn-opt";
                if (zutatenStatus[zutat] === 1) btn.classList.add('active-extra');
                if (zutatenStatus[zutat] === 2) btn.classList.add('active-without');
                
                btn.innerText = zutat;
                btn.onclick = () => toggleZutat(zutat);
                container.appendChild(btn);
            });
        }

        function toggleZutat(zutat) {
            // Zyklus: 0 -> 1 (Extra) -> 2 (Ohne) -> 0
            zutatenStatus[zutat] = (zutatenStatus[zutat] + 1) % 3;
            renderZutaten();
        }

        function confirmItem() {
            let extras = [];
            let without = [];
            for (let z in zutatenStatus) {
                if (zutatenStatus[z] === 1) extras.push(z);
                if (zutatenStatus[z] === 2) without.push(z);
            }

            let result = tempItem;
            let details = [];
            if (extras.length > 0) details.push("Extra: " + extras.join(", "));
            if (without.length > 0) details.push("OHNE: " + without.join(", "));
            
            if (details.length > 0) result += " [" + details.join(" | ") + "]";
            
            currentOrder.push(result);
            updateDisplay();
            closeModal();
        }

        function closeModal() {
            document.getElementById('extra-modal').style.display = "none";
        }

        // TIME LOGIC
        window.onload = () => setTime(30);

        function setTime(minutes) {
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            if (event) event.target.classList.add('active');
            
            let now = new Date();
            now.setMinutes(now.getMinutes() + minutes);
            selectedPickupTime = now.getHours().toString().padStart(2, '0') + ":" + 
                                 now.getMinutes().toString().padStart(2, '0');
        }

        function setCustomTime() {
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            selectedPickupTime = document.getElementById('custom-time').value;
        }

        // ORDER DISPLAY
        function updateDisplay() {
            const listElement = document.getElementById('order-list');
            const emptyMsg = document.getElementById('empty-msg');
            listElement.innerHTML = "";
            if (currentOrder.length === 0) {
                emptyMsg.style.display = "block";
            } else {
                emptyMsg.style.display = "none";
                currentOrder.forEach((item) => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    listElement.appendChild(li);
                });
            }
        }

        function undoLast() { currentOrder.pop(); updateDisplay(); }
        function clearOrder() { currentOrder = []; updateDisplay(); }

        function sendToKitchen() {
            if (currentOrder.length === 0) return alert("Bestellung ist leer!");
            alert("Bestellung für " + selectedPickupTime + " Uhr wird gesendet!");
            clearOrder();
        }
    </script>
</body>
</html>
