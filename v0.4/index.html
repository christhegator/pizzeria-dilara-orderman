<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzeria Dilara POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="extra-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Anpassen</h2>
            <div class="quick-options">
                <button id="btn-small" class="opt-toggle-btn" onclick="toggleQuickOpt('small')">KL. PORTION</button>
                <button id="btn-spicy" class="opt-toggle-btn" onclick="toggleQuickOpt('spicy')">SCHARF</button>
            </div>
            <div class="modal-section">
                <div class="extra-grid" id="zutaten-container"></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button onclick="confirmItem()" style="flex:2; padding:20px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold; font-size:1.1rem;">HINZUFÜGEN</button>
                <button onclick="closeModal()" style="flex:1; padding:20px; background:#999; color:white; border:none; border-radius:12px; font-weight:bold;">ABBRUCH</button>
            </div>
        </div>
    </div>

    <div class="menu-container">
        <div class="tab-bar">
            <button id="btn-pizza" class="tab-btn active" onclick="showTab('pizza-tab')">Pizzen</button>
            <button id="btn-others" class="tab-btn" onclick="showTab('others-tab')">Kebap / Salate</button>
        </div>

        <div id="pizza-tab" class="tab-content">
            <div class="menu-grid">
                <script>
                    const pizzen = ['Margherita', 'Diavolo', 'Dilara', 'Prosciutto Funghi', 'Tonno', 'Capricciosa', 'Calzone', 'Salatpizza', 'Hauspizza', 'Funghi', 'Quattro Formaggio', 'Frutti di Mare', 'Siziliana', 'Hawaii', 'Quattro Stagioni', 'Mister', 'Gorgonzola', 'Mexicana', 'Hansi', 'Ali\'s Pizza', 'Tyrolia', 'Regina', 'Vegetaria', 'Pizzabrot'];
                    pizzen.forEach(p => document.write(`<button class="pizza-btn" onclick="openExtraModal('${p}')">${p}</button>`));
                </script>
            </div>
        </div>

        <div id="others-tab" class="tab-content" style="display:none;">
            <div class="menu-grid">
                <script>
                    const others = ['Kebap', 'Kebap spezial', 'Kebap vegatarisch', 'Kebap Teller (Salat)', 'Kebap Teller (Pommes)', 'Dürüm', 'Dürüm spezial', 'Dürüm vegetarisch', 'Kebapfleisch', 'Pommes', 'Loaded Pommes', 'Fitnesssalat', 'Griechischer Salat', 'Gemischter Salat'];
                    others.forEach(o => document.write(`<button class="pizza-btn" onclick="openExtraModal('${o}')">${o}</button>`));
                </script>
            </div>
        </div>
    </div>

    <div class="order-sidebar">
        <h3>Bestellung</h3>
        <div class="order-box">
            <ul id="order-list"></ul>
            <div id="empty-msg" style="text-align:center; color:#999; margin-top:50px;">Warenkorb leer</div>
        </div>

        <div class="time-grid">
            <button class="time-btn" id="btn-time-15" onclick="setTime(15)">15m</button>
            <button class="time-btn" onclick="setTime(20)">20m</button>
            <button class="time-btn" onclick="setTime(30)">30m</button>
            <button class="time-btn" onclick="setTime(45)">45m</button>
            <input type="text" id="custom-time" class="time-btn time-input" placeholder="HH:MM" maxlength="5" inputmode="numeric" oninput="formatManualTime(this)">
        </div>

        <div class="action-buttons">
            <button class="undo-btn" onclick="undoLast()">⬅ RÜCK</button>
            <button class="clear-btn" onclick="clearOrder()">LÖSCHEN</button>
            <button class="send-btn" id="main-send-btn" onclick="sendToKitchen()">KÜCHE SENDEN</button>
        </div>
    </div>

    <script>
        const zutatenListe = ["Knoblauchöl", "Joghurtsauce", "Zwiebeln", "Käse", "Schafskäse", "Gorgonzola", "Kebapfleisch", "Thunfisch", "Schinken", "Salami", "Oliven", "Pilze", "Ruccola", "Salat", "Tomaten", "Ei", "Meeresfrüchte"];
        let currentOrder = [], tempItem = "", zutatenStatus = {}, selectedPickupTime = "", isSmall = false, isSpicy = false;

        window.onload = () => { setTime(15); };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function openExtraModal(itemName) {
            tempItem = itemName; zutatenStatus = {}; isSmall = false; isSpicy = false;
            document.getElementById('btn-small').classList.remove('active-blue');
            document.getElementById('btn-spicy').classList.remove('active-blue');
            zutatenListe.forEach(z => zutatenStatus[z] = 0);
            renderZutaten();
            document.getElementById('extra-modal').style.display = 'flex';
        }

        function toggleQuickOpt(type) {
            if(type==='small'){ isSmall=!isSmall; document.getElementById('btn-small').classList.toggle('active-blue'); }
            else { isSpicy=!isSpicy; document.getElementById('btn-spicy').classList.toggle('active-blue'); }
        }

        function renderZutaten() {
            const c = document.getElementById('zutaten-container'); c.innerHTML = "";
            zutatenListe.forEach(z => {
                const b = document.createElement('button'); b.className = "btn-opt";
                if(zutatenStatus[z]===1) b.classList.add('active-extra');
                if(zutatenStatus[z]===2) b.classList.add('active-without');
                b.innerText = z; b.onclick = () => { zutatenStatus[z]=(zutatenStatus[z]+1)%3; renderZutaten(); };
                c.appendChild(b);
            });
        }

        function confirmItem() {
            let ex = []; let wi = [];
            if(isSmall) ex.push("Kl. Portion"); if(isSpicy) ex.push("Scharf");
            for(let z in zutatenStatus){ if(zutatenStatus[z]===1) ex.push(z); if(zutatenStatus[z]===2) wi.push(z); }
            let res = tempItem; let det = [];
            if(ex.length>0) det.push("+"+ex.join(", "));
            if(wi.length>0) det.push("-"+wi.join(", "));
            if(det.length>0) res += " ("+det.join(" | ")+")";
            currentOrder.push(res); updateDisplay(); closeModal();
        }

        function closeModal() { document.getElementById('extra-modal').style.display='none'; }

        function setTime(m) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            if(event && event.target.classList.contains('time-btn')) event.target.classList.add('active');
            else document.getElementById('btn-time-15').classList.add('active');
            let n = new Date(); n.setMinutes(n.getMinutes() + m);
            selectedPickupTime = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
            document.getElementById('custom-time').value = ""; updateSendButtonLabel();
        }

        function formatManualTime(i) {
            let v = i.value.replace(/\D/g, "");
            if(v.length>=2) v = v.substring(0,2) + ":" + v.substring(2,4);
            i.value = v; if(v.length===5){ selectedPickupTime = v; document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active')); updateSendButtonLabel(); }
        }

        function updateSendButtonLabel() { document.getElementById('main-send-btn').innerText = `SENDEN (${selectedPickupTime})`; }

        function updateDisplay() {
            const l = document.getElementById('order-list'); document.getElementById('empty-msg').style.display = currentOrder.length===0 ? "block":"none";
            l.innerHTML = ""; currentOrder.forEach(i => { const li=document.createElement('li'); li.innerText=i; l.appendChild(li); });
        }

        function undoLast() { currentOrder.pop(); updateDisplay(); }
        function clearOrder() { if(confirm("Bestellung wirklich löschen?")){ currentOrder=[]; updateDisplay(); } }

        function sendToKitchen() {
            if(currentOrder.length===0) return alert("Bestellung ist leer!");
            if(confirm(`Bestellung für ${selectedPickupTime} absenden?`)){ alert("An die Küche gesendet!"); currentOrder=[]; updateDisplay(); setTime(15); }
        }
    </script>
</body>
</html>
