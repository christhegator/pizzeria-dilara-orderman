<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzeria Dilara POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="extra-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Anpassen</h2>
            <div class="quick-options">
                <button id="btn-small" class="opt-toggle-btn" onclick="toggleQuickOpt('small')">Kleine Portion</button>
                <button id="btn-spicy" class="opt-toggle-btn" onclick="toggleQuickOpt('spicy')">Scharf</button>
            </div>
            <div class="modal-section">
                <div class="extra-grid" id="zutaten-container"></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button onclick="confirmItem()" style="flex:2; padding:20px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold;">HINZUFÜGEN</button>
                <button onclick="closeModal()" style="flex:1; padding:20px; background:#f39c12; color:white; border:none; border-radius:12px; font-weight:bold;">ABBRUCH</button>
            </div>
        </div>
    </div>

    <div id="monitor-modal" class="modal">
        <div class="modal-content" style="max-width: 80%; min-height: 50%; background: #121212; color: white;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; color: white" >Bestellübersicht (Live)</h2>
                <button onclick="closeMonitor()" style="padding:10px 20px; background: #d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">X SCHLIESSEN</button>
            </div>
            <div id="monitor-live-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; max-height: 70vh; overflow-y: auto; padding: 15px;"></div>
        </div>
    </div>


    <div class="menu-container">

        <div class="tab-bar">
            <button id="btn-pizza" class="tab-btn active" onclick="showTab('pizza-tab')">Pizzen</button>
            <button id="btn-others" class="tab-btn" onclick="showTab('others-tab')">Kebap / Pommes / Salate</button>
        </div>

        <div id="pizza-tab" class="tab-content">
            <div class="menu-grid">
                <script>
                    const pizzen = ['Margherita', 'Diavolo', 'Dilara', 'Prosciutto Funghi', 'Tonno', 'Capricciosa', 'Calzone', 'Salatpizza', 'Hauspizza', 'Funghi', 'Quattro Formaggi', 'Frutti di Mare', 'Siziliana', 'Hawaii', 'Quattro Stagioni', 'Mister', 'Gorgonzola', 'Mexicana', 'Hansi', 'Alis Pizza', 'Tyrolia', 'Regina', 'Vegetaria', 'Pizzabrot'];
                    pizzen.forEach(p => document.write(`<button class="pizza-btn" onclick="openExtraModal('${p}')">${p}</button>`));
                </script>
            </div>
        </div>

        <div id="others-tab" class="tab-content" style="display:none;">
            <div class="menu-grid">
                <script>
                    const others = ['Kebap', 'Kebap spezial', 'Kebap vegetarisch', 'Kebap Teller (Salat)', 'Kebap Teller (Pommes)', 'Dürüm', 'Dürüm spezial', 'Dürüm vegetarisch', 'Kebapfleisch', 'Pommes', 'Loaded Pommes', 'Loaded Pommes spezial', 'Fitnesssalat', 'Griechischer Salat', 'Gemischter Salat'];
                    others.forEach(o => document.write(`<button class="pizza-btn" onclick="openExtraModal('${o}')">${o}</button>`));
                </script>
            </div>
        </div>
    </div>

    <div class="order-sidebar">
        <div class="order-header">
            <h3 style="margin:0;">Bestellung</h3>
            <div id="order-number-display" class="order-number-badge">Ticket #1</div>
            <button onclick="openMonitor()" class="monitor-badge-btn">Offene Bestellungen</button>
        </div>
        <div class="order-box">
            <ul id="order-list"></ul>
            <div id="empty-msg" style="text-align:center; color:#999; margin-top:50px;">Warenkorb leer</div>
        </div>

        <div class="time-grid">
            <button class="time-btn" id="btn-time-15" onclick="setTime(15)">15m</button>
            <button class="time-btn" onclick="setTime(20)">20m</button>
            <button class="time-btn" onclick="setTime(25)">25m</button>
            <button class="time-btn" onclick="setTime(30)">30m</button>
            <button class="time-btn" onclick="setTime(45)">45m</button>
            <button class="time-btn" onclick="setTime(60)">60m</button>
            <input type="text" id="custom-time" class="time-btn time-input" placeholder="HH:MM" maxlength="5" inputmode="numeric" oninput="formatManualTime(this)">
        </div>

        <div class="action-buttons">
            <button class="undo-btn" onclick="undoLast()">EINMAL ZURÜCK</button>
            <button class="clear-btn" onclick="clearOrder()">LÖSCHEN</button>
            <button class="send-btn" id="main-send-btn" onclick="sendToKitchen()">SENDEN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91SjJooMeFzG00w8sBdT8XUOk1PW9fIM",
            authDomain: "pizzeria-dilara.firebaseapp.com",
            projectId: "pizzeria-dilara",
            storageBucket: "pizzeria-dilara.firebasestorage.app",
            messagingSenderId: "481636272797",
            appId: "1:481636272797:web:f4be0b2a3c597966b9a274"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const zutatenListe = ["Knoblauchöl", "Joghurtsauce", "Zwiebeln", "Käse", "Schafskäse", "Gorgonzola", "Kebapfleisch", "Thunfisch", "Schinken", "Salami", "Mais", "Oliven", "Pilze", "Ruccola", "Salat", "Tomaten", "Artischoken", "Ei", "Meeresfrüchte"];
        
        let currentOrder = []; 
        let tempItem = ""; 
        let zutatenStatus = {}; 
        let selectedPickupTime = ""; 
        let isSmall = false; 
        let isSpicy = false;
        let currentOrderNum = 1;

        // TAB NAVIGATION
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            if(event) event.currentTarget.classList.add('active');
        };

        // MODAL LOGIK
        window.openExtraModal = (itemName) => {
            tempItem = itemName; 
            zutatenStatus = {}; 
            isSmall = false; 
            isSpicy = false;
            document.getElementById('btn-small').classList.remove('active-blue');
            document.getElementById('btn-spicy').classList.remove('active-blue');
            zutatenListe.forEach(z => zutatenStatus[z] = 0);
            renderZutaten();
            document.getElementById('extra-modal').style.display = 'flex';
        };

        window.toggleQuickOpt = (type) => {
            if(type === 'small') { 
                isSmall = !isSmall; 
                document.getElementById('btn-small').classList.toggle('active-blue'); 
            } else { 
                isSpicy = !isSpicy; 
                document.getElementById('btn-spicy').classList.toggle('active-blue'); 
            }
        };

        function renderZutaten() {
            const c = document.getElementById('zutaten-container'); 
            c.innerHTML = "";
            zutatenListe.forEach(z => {
                const b = document.createElement('button'); 
                b.className = "btn-opt";
                if(zutatenStatus[z] === 1) b.classList.add('active-extra');
                if(zutatenStatus[z] === 2) b.classList.add('active-without');
                b.innerText = z; 
                b.onclick = () => { zutatenStatus[z] = (zutatenStatus[z] + 1) % 3; renderZutaten(); };
                c.appendChild(b);
            });
        }

        // NEUE STRUKTURIERTE BESTÄTIGUNG
        window.confirmItem = () => {
            let eigenschaften = [];
            let mit = [];
            let ohne = [];

            if(isSmall) eigenschaften.push("Kleine Portion");
            if(isSpicy) eigenschaften.push("Scharf");

            for(let z in zutatenStatus){
                if(zutatenStatus[z] === 1) mit.push(z);
                if(zutatenStatus[z] === 2) ohne.push(z);
            }

            // Objekt erstellen statt String
            const itemObj = {
                name: tempItem,
                props: eigenschaften,
                add: mit,
                remove: ohne
            };

            currentOrder.unshift(itemObj); 
            updateDisplay(); 
            closeModal();
        };

        window.closeModal = () => { document.getElementById('extra-modal').style.display = 'none'; };

        function updateDisplay() {
            const l = document.getElementById('order-list'); 
            document.getElementById('empty-msg').style.display = currentOrder.length === 0 ? "block" : "none";
            l.innerHTML = ""; 
            
            currentOrder.forEach((item, index) => { 
                const li = document.createElement('li');
                
                // --- VORSCHAU-TEXT ZUSAMMENBAUEN ---
                let details = [];
                
                // 1. Eigenschaften (Scharf, Klein)
                if (item.props && item.props.length > 0) {
                    details.push(item.props.join(", "));
                }
                
                // 2. Extras (Mit)
                if (item.add && item.add.length > 0) {
                    details.push("+" + item.add.join(", "));
                }
                
                // 3. Extras (Ohne)
                if (item.remove && item.remove.length > 0) {
                    details.push("-" + item.remove.join(", "));
                }

                // Wenn Details vorhanden sind, mit Trenner in Klammern setzen
                let infoText = details.length > 0 ? ` <small style="color: #666;">(${details.join(" | ")})</small>` : "";

                li.innerHTML = `
                    <span style="flex:1">
                        <strong>${item.name}</strong>${infoText}
                    </span>
                    <button class="delete-item-btn" onclick="removeItem(${index})">✕</button>
                `;
                l.appendChild(li); 
            });
            updateOrderNumberDisplay();
        }

        window.removeItem = (index) => { currentOrder.splice(index, 1); updateDisplay(); };
        window.undoLast = () => { currentOrder.shift(); updateDisplay(); };
        window.clearOrder = () => { if(confirm("Bestellung löschen?")){ currentOrder = []; updateDisplay(); } };

        // --- OPTIMIERTE ZEIT LOGIK ---
        let currentSelectedMinutes = 15; // Standard-Vorlaufzeit merken

        window.setTime = (m, element = null) => {
            // 1. Alle Zeit-Buttons finden und die 'active' Klasse entfernen
            document.querySelectorAll('.time-grid .time-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 2. Button aktivieren (entweder durch Klick oder beim Start)
            let activeBtn = element;
            if (!activeBtn && window.event) activeBtn = window.event.currentTarget;
            if (!activeBtn && m === 15) activeBtn = document.getElementById('btn-time-15');

            if (activeBtn) {
                activeBtn.classList.add('active');
            }

            // 3. Gewählte Minuten im Speicher halten für das Auto-Update
            currentSelectedMinutes = m;
            
            // 4. Custom-Time Feld leeren
            document.getElementById('custom-time').value = ""; 
            document.getElementById('custom-time').classList.remove('active');
            
            // Sofort berechnen
            calculatePickupTime();
        };

        // Neue Hilfsfunktion: Berechnet die Zeit basierend auf JETZT + Auswahl
        function calculatePickupTime() {
            // Nur automatisch berechnen, wenn das manuelle Eingabefeld leer ist
            if (document.getElementById('custom-time').value === "") {
                let n = new Date(); 
                n.setMinutes(n.getMinutes() + currentSelectedMinutes);
                selectedPickupTime = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
                updateSendButtonLabel();
            }
        }

        // AUTO-UPDATE: Alle 10 Sekunden die Abholzeit "nachschieben"
        setInterval(() => {
            calculatePickupTime();
        }, 10000);

        window.formatManualTime = (i) => {
            let v = i.value.replace(/\D/g, "");
            if(v.length >= 2) v = v.substring(0,2) + ":" + v.substring(2,4);
            i.value = v; 
            
            if(v.length === 5) { 
                selectedPickupTime = v; 
                // Alle Minuten-Buttons deaktivieren
                document.querySelectorAll('.time-grid .time-btn').forEach(b => b.classList.remove('active')); 
                i.classList.add('active');
                updateSendButtonLabel(); 
            }
        };

        function updateSendButtonLabel() {
            const btn = document.getElementById('main-send-btn');
            if(btn) {
                btn.innerHTML = `SENDEN (${selectedPickupTime}) <span>Ticket #${currentOrderNum}</span>`;
            }
        }

        function initOrderNumber() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastOrderDate');
            const savedNum = localStorage.getItem('lastOrderNumber');

            if (lastDate === today && savedNum) {
                // Gleicher Tag: Normal weiterzählen
                currentOrderNum = parseInt(savedNum) + 1;
            } else {
                // NEUER TAG oder erster Start:
                currentOrderNum = 1;
                // WICHTIG: Sofort im Speicher hinterlegen, damit 
                // die alte Nummer vom Vortag gelöscht wird!
                localStorage.setItem('lastOrderDate', today);
                localStorage.setItem('lastOrderNumber', "0"); 
            }
            updateOrderNumberDisplay();
        }

        function updateOrderNumberDisplay() {
            document.getElementById('order-number-display').innerText = `Ticket #${currentOrderNum}`;
            updateSendButtonLabel();
        }

        // SENDEN AN FIREBASE
        window.sendToKitchen = async () => {
            if (currentOrder.length === 0) return alert("Warenkorb leer!");
            if (confirm(`Ticket #${currentOrderNum} senden?`)) {
                try {
                    await addDoc(collection(db, "bestellungen"), {
                        ticketNum: currentOrderNum,
                        items: currentOrder, // Sendet das Array von Objekten
                        pickupTime: selectedPickupTime,
                        status: "offen",
                        createdAt: serverTimestamp()
                    });
                    localStorage.setItem('lastOrderNumber', currentOrderNum.toString());
                    currentOrderNum++;
                    currentOrder = [];
                    updateDisplay();
                    setTime(15);
                    alert("An Küche gesendet!");
                } catch (e) {
                    console.error(e);
                    alert("Senden fehlgeschlagen!");
                }
            }
        };

        // Hier wird noch die Bestellübersicht eingefügt 
        let monitorUnsubscribe = null;

        window.openMonitor = () => {
            document.getElementById('monitor-modal').style.display = 'flex';
            const grid = document.getElementById('monitor-live-grid');
            grid.innerHTML = "Lade Daten...";

            // Live-Abfrage der offenen Bestellungen
            const q = query(collection(db, "bestellungen"));
            monitorUnsubscribe = onSnapshot(q, (snapshot) => {
                const docs = snapshot.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(d => d.status !== "erledigt")
                    .sort((a, b) => a.pickupTime.localeCompare(b.pickupTime));

                grid.innerHTML = "";
                if (docs.length === 0) {
                    grid.innerHTML = '<div style="color:#666;">Keine offenen Bestellungen.</div>';
                    return;
                }

                docs.forEach(data => {
                    const card = document.createElement('div');
                    card.style = "background:#f0f2f5; border-left: 5px solid #d32f2f; padding:10px; border-radius:8px; font-size:1.1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3);";
                    
                    const itemNames = data.items.map(i => typeof i === 'object' ? i.name : i).join(", ");
                    
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-weight:bold; color:#27ae60; margin-bottom:5px;">
                            <span>#${data.ticketNum}</span>
                            <span>${data.pickupTime} Uhr</span>
                        </div>
                        <div style="color:#333; font-weight: bold; font-size:1.0rem;">${itemNames}</div>
                    `;
                    grid.appendChild(card);
                });
            });
        };

        window.closeMonitor = () => {
            document.getElementById('monitor-modal').style.display = 'none';
            if (monitorUnsubscribe) monitorUnsubscribe(); // Verbindung trennen, wenn zu, um Akku/Daten zu sparen
        };









        // Ganz unten im Script-Teil
        initOrderNumber();
        // Simuliert einen Klick auf den 15m Button beim Start
        document.getElementById('btn-time-15').click();

        // Prüft alle 30 Sekunden, ob sich das Datum geändert hat (für Ticket-Reset)
        setInterval(() => {
            initOrderNumber();
        }, 30000);

    </script>
</body>
</html>
