<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzeria Dilara - Bestellaufnahme</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kurze Ergänzung für die neuen Quick-Buttons, falls noch nicht im CSS */
        .quick-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .opt-toggle-btn {
            flex: 1;
            padding: 15px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            cursor: pointer;
            font-size: 1rem;
        }
        .opt-toggle-btn.active-blue {
            background-color: #3498db !important;
            color: white !important;
            border-color: #2980b9;
        }
    </style>
</head>
<body>

    <div id="extra-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Anpassen</h2>
            
            <div class="quick-options">
                <button id="btn-small" class="opt-toggle-btn" onclick="toggleQuickOpt('small')">Kleine Portion</button>
                <button id="btn-spicy" class="opt-toggle-btn" onclick="toggleQuickOpt('spicy')">Scharf</button>
            </div>

            <p style="font-size: 0.8rem; color: #666;">1x Tippen = Extra (Grün) | 2x Tippen = Ohne (Rot)</p>
            <div class="modal-section">
                <div class="extra-grid" id="zutaten-container"></div>
            </div>
            <div class="modal-actions">
                <button class="confirm-btn" onclick="confirmItem()">HINZUFÜGEN</button>
                <button class="cancel-btn" onclick="closeModal()">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <header>
        <h1>Pizzeria Dilara, Ihre Bestellung bitte!</h1>
    </header>

    <main>
        <div class="tab-bar">
            <button id="btn-pizza" class="tab-btn active" onclick="showTab('pizza-tab')">Pizzen</button>
            <button id="btn-others" class="tab-btn" onclick="showTab('others-tab')">Kebap / Salate</button>
        </div>

        <div id="pizza-tab" class="tab-content active">
            <section class="menu-section">
                <div class="menu-grid">
                    <button class="pizza-btn" onclick="openExtraModal('Margherita')">Margherita</button>
                    <button class="pizza-btn" onclick="openExtraModal('Diavolo')">Diavolo</button>
                    <button class="pizza-btn" onclick="openExtraModal('Dilara')">Dilara</button>
                    <button class="pizza-btn" onclick="openExtraModal('Pros. Funghi')">Pros. Funghi</button>
                    <button class="pizza-btn" onclick="openExtraModal('Tonno')">Tonno</button>
                    <button class="pizza-btn" onclick="openExtraModal('Capricciosa')">Capricciosa</button>
                    <button class="pizza-btn" onclick="openExtraModal('Calzone')">Calzone</button>
                    <button class="pizza-btn" onclick="openExtraModal('Salatpizza')">Salatpizza</button>
                    <button class="pizza-btn" onclick="openExtraModal('Hauspizza')">Hauspizza</button>
                    <button class="pizza-btn" onclick="openExtraModal('Funghi')">Funghi</button>
                    <button class="pizza-btn" onclick="openExtraModal('Quattro Form.')">Quattro Form.</button>
                    <button class="pizza-btn" onclick="openExtraModal('Frutti di Mare')">Frutti di Mare</button>
                    <button class="pizza-btn" onclick="openExtraModal('Siziliana')">Siziliana</button>
                    <button class="pizza-btn" onclick="openExtraModal('Hawaii')">Hawaii</button>
                    <button class="pizza-btn" onclick="openExtraModal('Quattro Stat.')">Quattro Stat.</button>
                    <button class="pizza-btn" onclick="openExtraModal('Mister')">Mister</button>
                    <button class="pizza-btn" onclick="openExtraModal('Gorgonzola')">Gorgonzola</button>
                    <button class="pizza-btn" onclick="openExtraModal('Mexicana')">Mexicana</button>
                    <button class="pizza-btn" onclick="openExtraModal('Hansi')">Hansi</button>
                    <button class="pizza-btn" onclick="openExtraModal('Alis Pizza')">Alis Pizza</button>
                    <button class="pizza-btn" onclick="openExtraModal('Tyrolia')">Tyrolia</button>
                    <button class="pizza-btn" onclick="openExtraModal('Regina')">Regina</button>
                    <button class="pizza-btn" onclick="openExtraModal('Vegetaria')">Vegetaria</button>
                    <button class="pizza-btn" onclick="openExtraModal('Pizzabrot')">Pizzabrot</button>
                </div>
            </section>
        </div>

        <div id="others-tab" class="tab-content">
            <section class="menu-section">
                <div class="menu-grid">
                    <button class="pizza-btn" onclick="openExtraModal('Kebap')">Kebap</button>
                    <button class="pizza-btn" onclick="openExtraModal('Kebap spez.')">Kebap spez.</button>
                    <button class="pizza-btn" onclick="openExtraModal('Kebap veg.')">Kebap veg.</button>
                    <button class="pizza-btn" onclick="openExtraModal('Kebap Teller (Salat)')">Kebap Teller (S)</button>
                    <button class="pizza-btn" onclick="openExtraModal('Kebap Teller (Pommes)')">Kebap Teller (P)</button>
                    <button class="pizza-btn" onclick="openExtraModal('Dürüm')">Dürüm</button>
                    <button class="pizza-btn" onclick="openExtraModal('Dürüm spez.')">Dürüm spez.</button>
                    <button class="pizza-btn" onclick="openExtraModal('Dürüm veg.')">Dürüm veg.</button>
                    <button class="pizza-btn" onclick="openExtraModal('Kebapfleisch')">Kebapfleisch</button>
                    <button class="pizza-btn" onclick="openExtraModal('Pommes')">Pommes</button>
                    <button class="pizza-btn" onclick="openExtraModal('Loaded Pommes')">Loaded Pommes</button>
                    <button class="pizza-btn" onclick="openExtraModal('Loaded Pommes spez.')">L. Pommes spez.</button>
                </div>
                <div class="menu-grid">
                    <button class="pizza-btn" onclick="openExtraModal('Fitnesssalat')">Fitnesssalat</button>
                    <button class="pizza-btn" onclick="openExtraModal('Griechischer Salat')">Griechischer</button>
                    <button class="pizza-btn" onclick="openExtraModal('Gemischter Salat')">Gemischter Salat</button>
                </div>
            </section>
        </div>

        <div class="fixed-footer">
            <section class="time-section">
                <div class="time-grid">
                    <button class="time-btn" id="btn-time-15" onclick="setTime(15)">15m</button>
                    <button class="time-btn" onclick="setTime(20)">20m</button>
                    <button class="time-btn" onclick="setTime(30)">30m</button>
                    <button class="time-btn" onclick="setTime(45)">45m</button>
                    <input type="text" id="custom-time" class="time-btn time-input" placeholder="HH:MM" maxlength="5" inputmode="numeric" oninput="formatManualTime(this)">
                </div>
            </section>

            <section class="order-section">
                <div class="order-box">
                    <ul id="order-list"></ul>
                    <div id="empty-msg">Bestellung leer</div>
                </div>
                <div class="action-buttons">
                    <button class="undo-btn" onclick="undoLast()">⬅ RÜCK</button>
                    <button class="clear-btn" onclick="clearOrder()">LÖSCHEN</button>
                    <button class="send-btn" id="main-send-btn" onclick="sendToKitchen()">KÜCHE SENDEN</button>
                </div>
            </section>
        </div>
    </main>

    <script>
        const zutatenListe = ["Knoblauchöl", "Joghurtsauce", "Zwiebeln", "Käse", "Schafskäse", "Gorgonzola", "Kebapfleisch", "Thunfisch", "Schinken", "Salami", "Oliven", "Pilze", "Ruccola", "Salat", "Tomaten", "Ei", "Meeresfrüchte"];
        let currentOrder = [];
        let tempItem = "";
        let zutatenStatus = {};
        let selectedPickupTime = "";
        
        // Quick Options Variablen
        let isSmall = false;
        let isSpicy = false;

        window.onload = () => { setTime(15); };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }

        // MODAL LOGIC
        function openExtraModal(itemName) {
            tempItem = itemName;
            zutatenStatus = {}; 
            
            // Reset Quick Options beim Öffnen
            isSmall = false;
            isSpicy = false;
            document.getElementById('btn-small').classList.remove('active-blue');
            document.getElementById('btn-spicy').classList.remove('active-blue');

            zutatenListe.forEach(z => zutatenStatus[z] = 0);
            document.getElementById('modal-title').innerText = itemName + " anpassen";
            renderZutaten();
            document.getElementById('extra-modal').style.display = "flex";
        }

        function toggleQuickOpt(type) {
            if (type === 'small') {
                isSmall = !isSmall;
                document.getElementById('btn-small').classList.toggle('active-blue');
            } else if (type === 'spicy') {
                isSpicy = !isSpicy;
                document.getElementById('btn-spicy').classList.toggle('active-blue');
            }
        }

        function renderZutaten() {
            const container = document.getElementById('zutaten-container');
            container.innerHTML = "";
            zutatenListe.forEach(zutat => {
                const btn = document.createElement('button');
                btn.className = "btn-opt";
                if (zutatenStatus[zutat] === 1) btn.classList.add('active-extra');
                if (zutatenStatus[zutat] === 2) btn.classList.add('active-without');
                btn.innerText = zutat;
                btn.onclick = () => { zutatenStatus[zutat] = (zutatenStatus[zutat] + 1) % 3; renderZutaten(); };
                container.appendChild(btn);
            });
        }

        function confirmItem() {
            let extras = [], without = [];
            
            // Erst Quick-Options hinzufügen
            if (isSmall) extras.push("Kl. Portion");
            if (isSpicy) extras.push("Scharf");

            for (let z in zutatenStatus) {
                if (zutatenStatus[z] === 1) extras.push(z);
                if (zutatenStatus[z] === 2) without.push(z);
            }
            
            let res = tempItem;
            let det = [];
            if (extras.length > 0) det.push("+" + extras.join(", "));
            if (without.length > 0) det.push("-" + without.join(", "));
            if (det.length > 0) res += " (" + det.join(" | ") + ")";
            
            currentOrder.push(res);
            updateDisplay();
            closeModal();
        }

        function closeModal() { document.getElementById('extra-modal').style.display = "none"; }

        // ZEIT LOGIK
        function setTime(m) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target && event.target.classList.contains('time-btn')) {
                event.target.classList.add('active');
            } else {
                document.getElementById('btn-time-15').classList.add('active');
            }
            let n = new Date(); 
            n.setMinutes(n.getMinutes() + m);
            selectedPickupTime = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0');
            document.getElementById('custom-time').value = "";
            updateSendButtonLabel();
        }

        function formatManualTime(input) {
            let val = input.value.replace(/\D/g, "");
            if (val.length >= 2) {
                val = val.substring(0, 2) + ":" + val.substring(2, 4);
            }
            input.value = val;
            if (val.length === 5) {
                selectedPickupTime = val;
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                updateSendButtonLabel();
            }
        }

        function updateSendButtonLabel() {
            const btn = document.getElementById('main-send-btn');
            if (selectedPickupTime) {
                btn.innerText = `KÜCHE SENDEN (${selectedPickupTime})`;
            }
        }
        
        function updateDisplay() {
            const list = document.getElementById('order-list');
            const msg = document.getElementById('empty-msg');
            list.innerHTML = "";
            msg.style.display = currentOrder.length === 0 ? "block" : "none";
            currentOrder.forEach(i => { 
                const li = document.createElement('li'); 
                li.textContent = i; 
                list.appendChild(li); 
            });
        }

        function undoLast() { currentOrder.pop(); updateDisplay(); }
        
        function clearOrder() { 
            if (currentOrder.length > 0 && confirm("Bestellung wirklich löschen?")) {
                currentOrder = []; 
                updateDisplay(); 
            }
        }

        function sendToKitchen() {
            if (currentOrder.length === 0) return alert("Bestellung leer!");
            const timeRegex = /^([01]?[0-9]|2[0-3]):[0-5][0-9]$/;
            if (!timeRegex.test(selectedPickupTime)) {
                return alert("Bitte Zeit im Format HH:MM eingeben!");
            }
            if (confirm(`Absenden für ${selectedPickupTime} Uhr?`)) {
                alert("An die Küche gesendet!");
                currentOrder = [];
                updateDisplay();
                setTime(15); 
            }
        }
    </script>
</body>
</html>
