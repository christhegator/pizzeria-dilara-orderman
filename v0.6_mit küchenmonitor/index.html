<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>POS-System | Pizzeria Dilara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-container">
        <header>
            <h1>🍕 Pizzeria Dilara POS</h1>
        </header>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('pizza')">PIZZA</button>
            <button class="tab-btn" onclick="switchTab('kebab')">KEBAB / BOX</button>
            <button class="tab-btn" onclick="switchTab('getraenke')">GETRÄNKE</button>
        </div>

        <div id="menu-content" class="tab-content">
            <div id="pizza-grid" class="menu-grid"></div>
        </div>
    </div>

    <div class="order-sidebar">
        <div class="order-header">
            <span class="order-number-badge" id="ticket-display">TICKET #1</span>
            <span style="font-weight: bold; color: #555;">WARENKORB</span>
        </div>

        <div class="order-box">
            <ul id="order-list">
                </ul>
        </div>

        <div class="time-grid">
            <button class="time-btn" onclick="setTime('ASAP')">SOFORT</button>
            <button class="time-btn" onclick="setTime('15')">+15 Min</button>
            <button class="time-btn" onclick="setTime('30')">+30 Min</button>
            <button class="time-btn" onclick="setTime('45')">+45 Min</button>
            <input type="time" id="custom-time" class="time-input">
        </div>

        <div class="action-buttons">
            <button class="undo-btn" onclick="undoLast()">RÜCKGÄNGIG</button>
            <button class="clear-btn" onclick="clearOrder()">LÖSCHEN</button>
            <button class="send-btn" id="send-trigger">
                KÜCHE SENDEN
                <span id="target-time-display">Abholung: --:-- Uhr</span>
            </button>
        </div>
    </div>

    <div id="options-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Extras anpassen</h2>
            
            <div class="quick-options">
                <button class="opt-toggle-btn" id="btn-small" onclick="toggleProp('Kl. Portion')">Kleine Portion</button>
                <button class="opt-toggle-btn" id="btn-spicy" onclick="toggleProp('Scharf')">Scharf 🌶️</button>
            </div>

            <div class="extra-grid">
                <button class="btn-opt" onclick="toggleExtra('Zwiebeln')">Zwiebeln</button>
                <button class="btn-opt" onclick="toggleExtra('Knoblauch')">Knoblauch</button>
                <button class="btn-opt" onclick="toggleExtra('Käse')">Extra Käse</button>
                <button class="btn-opt" onclick="toggleExtra('Oliven')">Oliven</button>
                <button class="btn-opt" onclick="toggleExtra('Salami')">Salami</button>
                <button class="btn-opt" onclick="toggleExtra('Pilze')">Pilze</button>
            </div>

            <div style="margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="tab-btn" onclick="closeModal()">ABBRECHEN</button>
                <button class="send-btn" onclick="confirmProduct()" style="grid-column: span 1; padding: 15px;">HINZUFÜGEN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91SjJooMeFzG00w8sBdT8XUOk1PW9fIM",
            authDomain: "pizzeria-dilara.firebaseapp.com",
            projectId: "pizzeria-dilara",
            storageBucket: "pizzeria-dilara.firebasestorage.app",
            messagingSenderId: "481636272797",
            appId: "1:481636272797:web:f4be0b2a3c597966b9a274"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- POS LOGIK ---
        let order = [];
        let currentTicketNum = 1;
        let selectedTime = "";

        // Modal State
        let currentBaseProduct = "";
        let activeExtras = []; // Format: {name: 'Zwiebeln', type: 'mit'} oder 'ohne'
        let activeProps = [];

        const menuData = {
            pizza: ["Margherita", "Salami", "Funghi", "Tonno", "Hawaii", "Vegetaria", "Diavola", "Quattro Formaggi", "Capricciosa"],
            kebab: ["Kebab Brot", "Dürüm", "Kebab Box (Reis)", "Kebab Box (Pommes)", "Falafel Brot", "Pizzabrot"],
            getraenke: ["Cola 0,33l", "Fanta 0,33l", "Sprite 0,33l", "Wasser", "Ayran", "Uludag"]
        };

        window.switchTab = (category) => {
            const grid = document.getElementById('pizza-grid');
            grid.innerHTML = "";
            menuData[category].forEach(item => {
                const btn = document.createElement('button');
                btn.className = "pizza-btn";
                btn.innerText = item;
                btn.onclick = () => openOptions(item);
                grid.appendChild(btn);
            });
            // Tab-Buttons optisch umschalten
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.openOptions = (product) => {
            currentBaseProduct = product;
            activeExtras = [];
            activeProps = [];
            document.getElementById('modal-title').innerText = product;
            document.querySelectorAll('.btn-opt, .opt-toggle-btn').forEach(b => {
                b.classList.remove('active-extra', 'active-without', 'active-blue');
            });
            document.getElementById('options-modal').style.display = 'flex';
        };

        window.toggleProp = (prop) => {
            const btn = event.target;
            if (activeProps.includes(prop)) {
                activeProps = activeProps.filter(p => p !== prop);
                btn.classList.remove('active-blue');
            } else {
                activeProps.push(prop);
                btn.classList.add('active-blue');
            }
        };

        window.toggleExtra = (extra) => {
            const btn = event.target;
            // Zyklus: Normal -> Mit (+) -> Ohne (-) -> Normal
            const existing = activeExtras.find(e => e.name === extra);
            
            if (!existing) {
                activeExtras.push({name: extra, type: 'mit'});
                btn.classList.add('active-extra');
                btn.innerText = "+ " + extra;
            } else if (existing.type === 'mit') {
                existing.type = 'ohne';
                btn.classList.remove('active-extra');
                btn.classList.add('active-without');
                btn.innerText = "- " + extra;
            } else {
                activeExtras = activeExtras.filter(e => e.name !== extra);
                btn.classList.remove('active-without');
                btn.innerText = extra;
            }
        };

        window.confirmProduct = () => {
            let finalString = currentBaseProduct;
            let details = [];
            
            activeProps.forEach(p => details.push(p));
            activeExtras.forEach(e => {
                details.push((e.type === 'mit' ? '+' : '-') + e.name);
            });

            if (details.length > 0) {
                finalString += " (" + details.join(" | ") + ")";
            }

            order.unshift(finalString);
            updateUI();
            closeModal();
        };

        window.closeModal = () => document.getElementById('options-modal').style.display = 'none';

        window.setTime = (val) => {
            const now = new Date();
            if (val === 'ASAP') {
                now.setMinutes(now.getMinutes() + 10);
            } else {
                now.setMinutes(now.getMinutes() + parseInt(val));
            }
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            selectedTime = timeStr;
            document.getElementById('custom-time').value = timeStr;
            document.getElementById('target-time-display').innerText = "Abholung: " + timeStr + " Uhr";
        };

        window.updateUI = () => {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            order.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${item}</span> <button class="delete-item-btn" onclick="deleteItem(${index})">X</button>`;
                list.appendChild(li);
            });
            document.getElementById('ticket-display').innerText = "TICKET #" + currentTicketNum;
        };

        window.deleteItem = (index) => {
            order.splice(index, 1);
            updateUI();
        };

        window.clearOrder = () => {
            order = [];
            updateUI();
        };

        window.undoLast = () => {
            order.shift();
            updateUI();
        };

        // --- CLOUD SENDEN ---
        document.getElementById('send-trigger').onclick = async () => {
            if (order.length === 0) return alert("Warenkorb leer!");
            
            const timeVal = document.getElementById('custom-time').value;
            if (!timeVal) return alert("Bitte Abholzeit wählen!");

            try {
                await addDoc(collection(db, "bestellungen"), {
                    ticketNum: currentTicketNum,
                    items: order,
                    pickupTime: timeVal,
                    status: "offen", // Wichtig für die Küche!
                    createdAt: serverTimestamp()
                });

                alert("Gesendet an Küche! Ticket #" + currentTicketNum);
                currentTicketNum++;
                clearOrder();
            } catch (e) {
                console.error(e);
                alert("Fehler beim Senden!");
            }
        };

        // Init
        switchTab('pizza');
        setTime('15');
    </script>
</body>
</html>
