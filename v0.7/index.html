<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzeria Dilara POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="extra-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Anpassen</h2>
            <div class="quick-options">
                <button id="btn-small" class="opt-toggle-btn" onclick="toggleQuickOpt('small')">KL. PORTION</button>
                <button id="btn-spicy" class="opt-toggle-btn" onclick="toggleQuickOpt('spicy')">SCHARF</button>
            </div>
            <div class="modal-section">
                <div class="extra-grid" id="zutaten-container"></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button onclick="confirmItem()" style="flex:2; padding:20px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold;">HINZUFÜGEN</button>
                <button onclick="closeModal()" style="flex:1; padding:20px; background:#999; color:white; border:none; border-radius:12px; font-weight:bold;">ABBRUCH</button>
            </div>
        </div>
    </div>

    <div class="menu-container">

        <div class="tab-bar">
            <button id="btn-pizza" class="tab-btn active" onclick="showTab('pizza-tab')">Pizzen</button>
            <button id="btn-others" class="tab-btn" onclick="showTab('others-tab')">Kebap / Salate</button>
        </div>

        <div id="pizza-tab" class="tab-content">
            <div class="menu-grid">
                <script>
                    const pizzen = ['Margherita', 'Diavolo', 'Dilara', 'Prosciutto Funghi', 'Tonno', 'Capricciosa', 'Calzone', 'Salatpizza', 'Hauspizza', 'Funghi', 'Quattro Formaggi', 'Frutti di Mare', 'Siziliana', 'Hawaii', 'Quattro Stagioni', 'Mister', 'Gorgonzola', 'Mexicana', 'Hansi', 'Alis Pizza', 'Tyrolia', 'Regina', 'Vegetaria', 'Pizzabrot'];
                    pizzen.forEach(p => document.write(`<button class="pizza-btn" onclick="openExtraModal('${p}')">${p}</button>`));
                </script>
            </div>
        </div>

        <div id="others-tab" class="tab-content" style="display:none;">
            <div class="menu-grid">
                <script>
                    const others = ['Kebap', 'Kebap spezial', 'Kebap vegetarisch', 'Kebap Teller (Salat)', 'Kebap Teller (Pommes)', 'Dürüm', 'Dürüm spezial', 'Dürüm vegetarisch', 'Kebapfleisch', 'Pommes', 'Loaded Pommes', 'Loaded Pommes spezial', 'Fitnesssalat', 'Griechischer', 'Gemischter'];
                    others.forEach(o => document.write(`<button class="pizza-btn" onclick="openExtraModal('${o}')">${o}</button>`));
                </script>
            </div>
        </div>
    </div>

    <div class="order-sidebar">
        <div class="order-header">
            <h3 style="margin:0;">Bestellung</h3>
            <div id="order-number-display" class="order-number-badge">Ticket #1</div>
        </div>
        <div class="order-box">
            <ul id="order-list"></ul>
            <div id="empty-msg" style="text-align:center; color:#999; margin-top:50px;">Warenkorb leer</div>
        </div>

        <div class="time-grid">
            <button class="time-btn" id="btn-time-15" onclick="setTime(15)">15m</button>
            <button class="time-btn" onclick="setTime(20)">20m</button>
            <button class="time-btn" onclick="setTime(30)">30m</button>
            <button class="time-btn" onclick="setTime(45)">45m</button>
            <input type="text" id="custom-time" class="time-btn time-input" placeholder="HH:MM" maxlength="5" inputmode="numeric" oninput="formatManualTime(this)">
        </div>

        <div class="action-buttons">
            <button class="undo-btn" onclick="undoLast()">⬅ RÜCK</button>
            <button class="clear-btn" onclick="clearOrder()">LÖSCHEN</button>
            <button class="send-btn" id="main-send-btn" onclick="sendToKitchen()">KÜCHE SENDEN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91SjJooMeFzG00w8sBdT8XUOk1PW9fIM",
            authDomain: "pizzeria-dilara.firebaseapp.com",
            projectId: "pizzeria-dilara",
            storageBucket: "pizzeria-dilara.firebasestorage.app",
            messagingSenderId: "481636272797",
            appId: "1:481636272797:web:f4be0b2a3c597966b9a274"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const zutatenListe = ["Knoblauchöl", "Joghurtsauce", "Zwiebeln", "Käse", "Schafskäse", "Gorgonzola", "Kebapfleisch", "Thunfisch", "Schinken", "Salami", "Oliven", "Pilze", "Ruccola", "Salat", "Tomaten", "Ei", "Meeresfrüchte"];
        
        let currentOrder = []; 
        let tempItem = ""; 
        let zutatenStatus = {}; 
        let selectedPickupTime = ""; 
        let isSmall = false; 
        let isSpicy = false;
        let currentOrderNum = 1;

        // TAB NAVIGATION
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            if(event) event.currentTarget.classList.add('active');
        };

        // MODAL LOGIK
        window.openExtraModal = (itemName) => {
            tempItem = itemName; 
            zutatenStatus = {}; 
            isSmall = false; 
            isSpicy = false;
            document.getElementById('btn-small').classList.remove('active-blue');
            document.getElementById('btn-spicy').classList.remove('active-blue');
            zutatenListe.forEach(z => zutatenStatus[z] = 0);
            renderZutaten();
            document.getElementById('extra-modal').style.display = 'flex';
        };

        window.toggleQuickOpt = (type) => {
            if(type === 'small') { 
                isSmall = !isSmall; 
                document.getElementById('btn-small').classList.toggle('active-blue'); 
            } else { 
                isSpicy = !isSpicy; 
                document.getElementById('btn-spicy').classList.toggle('active-blue'); 
            }
        };

        function renderZutaten() {
            const c = document.getElementById('zutaten-container'); 
            c.innerHTML = "";
            zutatenListe.forEach(z => {
                const b = document.createElement('button'); 
                b.className = "btn-opt";
                if(zutatenStatus[z] === 1) b.classList.add('active-extra');
                if(zutatenStatus[z] === 2) b.classList.add('active-without');
                b.innerText = z; 
                b.onclick = () => { zutatenStatus[z] = (zutatenStatus[z] + 1) % 3; renderZutaten(); };
                c.appendChild(b);
            });
        }

        // NEUE STRUKTURIERTE BESTÄTIGUNG
        window.confirmItem = () => {
            let eigenschaften = [];
            let mit = [];
            let ohne = [];

            if(isSmall) eigenschaften.push("Kl. Portion");
            if(isSpicy) eigenschaften.push("Scharf");

            for(let z in zutatenStatus){
                if(zutatenStatus[z] === 1) mit.push(z);
                if(zutatenStatus[z] === 2) ohne.push(z);
            }

            // Objekt erstellen statt String
            const itemObj = {
                name: tempItem,
                props: eigenschaften,
                add: mit,
                remove: ohne
            };

            currentOrder.unshift(itemObj); 
            updateDisplay(); 
            closeModal();
        };

        window.closeModal = () => { document.getElementById('extra-modal').style.display = 'none'; };

        function updateDisplay() {
            const l = document.getElementById('order-list'); 
            document.getElementById('empty-msg').style.display = currentOrder.length === 0 ? "block" : "none";
            l.innerHTML = ""; 
            
            currentOrder.forEach((item, index) => { 
                const li = document.createElement('li');
                
                // --- VORSCHAU-TEXT ZUSAMMENBAUEN ---
                let details = [];
                
                // 1. Eigenschaften (Scharf, Klein)
                if (item.props && item.props.length > 0) {
                    details.push(item.props.join(", "));
                }
                
                // 2. Extras (Mit)
                if (item.add && item.add.length > 0) {
                    details.push("+" + item.add.join(", "));
                }
                
                // 3. Extras (Ohne)
                if (item.remove && item.remove.length > 0) {
                    details.push("-" + item.remove.join(", "));
                }

                // Wenn Details vorhanden sind, mit Trenner in Klammern setzen
                let infoText = details.length > 0 ? ` <small style="color: #666;">(${details.join(" | ")})</small>` : "";

                li.innerHTML = `
                    <span style="flex:1">
                        <strong>${item.name}</strong>${infoText}
                    </span>
                    <button class="delete-item-btn" onclick="removeItem(${index})">✕</button>
                `;
                l.appendChild(li); 
            });
            updateOrderNumberDisplay();
        }

        window.removeItem = (index) => { currentOrder.splice(index, 1); updateDisplay(); };
        window.undoLast = () => { currentOrder.shift(); updateDisplay(); };
        window.clearOrder = () => { if(confirm("Bestellung löschen?")){ currentOrder = []; updateDisplay(); } };

        // ZEIT LOGIK
        window.setTime = (m) => {
            // 1. Alle Zeit-Buttons finden und die 'active' Klasse entfernen
            document.querySelectorAll('.time-grid .time-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 2. Dem aktuell geklickten Button die Klasse hinzufügen
            // Wir nutzen event.currentTarget, um genau den Button zu treffen
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }

            // 3. Zeit berechnen
            let n = new Date(); 
            n.setMinutes(n.getMinutes() + m);
            selectedPickupTime = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
            
            // 4. Custom-Time Feld leeren, da eine Schnellwahl getroffen wurde
            document.getElementById('custom-time').value = ""; 
            document.getElementById('custom-time').classList.remove('active');
            
            updateSendButtonLabel();
        };

        window.formatManualTime = (i) => {
            let v = i.value.replace(/\D/g, "");
            if(v.length >= 2) v = v.substring(0,2) + ":" + v.substring(2,4);
            i.value = v; 
            
            if(v.length === 5) { 
                selectedPickupTime = v; 
                
                // Alle Minuten-Buttons deaktivieren
                document.querySelectorAll('.time-grid .time-btn').forEach(b => b.classList.remove('active')); 
                // Das Input-Feld selbst als aktiv markieren
                i.classList.add('active');
                
                updateSendButtonLabel(); 
            }
        };

        function updateSendButtonLabel() {
            document.getElementById('main-send-btn').innerHTML = `SENDEN (${selectedPickupTime}) <span>Ticket #${currentOrderNum}</span>`;
        }

        function initOrderNumber() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastOrderDate');
            const savedNum = localStorage.getItem('lastOrderNumber');
            if (lastDate === today && savedNum) {
                currentOrderNum = parseInt(savedNum) + 1;
            } else {
                currentOrderNum = 1;
                localStorage.setItem('lastOrderDate', today);
            }
            updateOrderNumberDisplay();
        }

        function updateOrderNumberDisplay() {
            document.getElementById('order-number-display').innerText = `Ticket #${currentOrderNum}`;
            updateSendButtonLabel();
        }

        // SENDEN AN FIREBASE
        window.sendToKitchen = async () => {
            if (currentOrder.length === 0) return alert("Warenkorb leer!");
            if (confirm(`Ticket #${currentOrderNum} senden?`)) {
                try {
                    await addDoc(collection(db, "bestellungen"), {
                        ticketNum: currentOrderNum,
                        items: currentOrder, // Sendet das Array von Objekten
                        pickupTime: selectedPickupTime,
                        status: "offen",
                        createdAt: serverTimestamp()
                    });
                    localStorage.setItem('lastOrderNumber', currentOrderNum.toString());
                    currentOrderNum++;
                    currentOrder = [];
                    updateDisplay();
                    setTime(15);
                    alert("An Küche gesendet!");
                } catch (e) {
                    console.error(e);
                    alert("Senden fehlgeschlagen!");
                }
            }
        };

        // Ganz unten im Script-Teil
        initOrderNumber();
        // Simuliert einen Klick auf den 15m Button beim Start
        document.getElementById('btn-time-15').click();
    </script>
</body>
</html>
